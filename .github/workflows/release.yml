name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libdbus-1-dev libssl-dev espeak-ng

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit -p .

      - name: Lint
        run: pnpm lint

      - name: Frontend tests
        run: pnpm test

      - name: Rust checks
        run: |
          cd src-tauri
          cargo clippy -- -D warnings
          cargo test

  release:
    needs: test
    environment: release
    strategy:
      matrix:
        include:
          # macOS legs (aarch64-apple-darwin, x86_64-apple-darwin) are
          # deliberately not built here: macos-14 GitHub-hosted runners bill
          # against paid minutes (10x multiplier vs. Linux), and this
          # account's billing is blocked. Built locally instead and uploaded
          # by hand alongside this job's Linux artifact — see release notes
          # for v0.1.1. Re-add here once billing is sorted or a self-hosted
          # macOS runner is wired up.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            contract_target: linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libdbus-1-dev libssl-dev

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Set by tauri build to sign the bundle for the updater — the
          # matching pubkey lives in src-tauri/tauri.conf.json. Without
          # these secrets configured, the build still succeeds but
          # produces unsigned bundles the updater will refuse to install.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Package updater artifact to match the open-atelier.app/update contract
        # The update server expects one asset named exactly
        # Open-Atelier-<version>-<contract_target><ext> plus a same-named
        # `.sig` file next to it (see docs/architecture — updater
        # contract). Tauri itself only names its updater bundle
        # (*.app.tar.gz on macOS, *.AppImage.tar.gz on Linux) after the
        # product name/arch, not this contract's naming, so it has to be
        # copied under the expected name rather than relied on as-is.
        # Globbing for the extension (rather than a hardcoded path) keeps
        # this resilient to the exact bundle filename Tauri produces.
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          fi
          # A distinct staging dir, not "dist" — that name collides with
          # frontendDist ("../dist" in tauri.conf.json), the Vite frontend
          # build's own output directory at the repo root, which already
          # has unrelated files (assets/, index.html) in it by this point.
          mkdir -p release-dist
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          src_tarball="$(find "$bundle_dir" -name '*.tar.gz' | head -n1)"
          if [ -z "$src_tarball" ]; then
            echo "No updater .tar.gz bundle found under $bundle_dir — is the updater plugin active in tauri.conf.json?" >&2
            exit 1
          fi
          dest="release-dist/Open-Atelier-${version}-${{ matrix.contract_target }}.tar.gz"
          cp "$src_tarball" "$dest"
          cp "$src_tarball.sig" "$dest.sig"
          # macOS runners ship BSD `shasum`, not GNU `sha256sum` — fall back
          # to whichever is actually present rather than assuming Linux.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum release-dist/* > "release-dist/Open-Atelier-${version}-${{ matrix.contract_target }}.sha256"
          else
            shasum -a 256 release-dist/* > "release-dist/Open-Atelier-${version}-${{ matrix.contract_target }}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: open-atelier-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            release-dist/*

  publish-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate combined checksums
        run: find artifacts -type f -exec sha256sum {} \; > checksums.txt

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/Open-Atelier-*
            checksums.txt

      # Uploading the renamed Open-Atelier-<version>-<target>.tar.gz(.sig)
      # artifacts from `artifacts/**/release-dist/` to
      # open-atelier.app/update/downloads/<version>/, and bumping
      # `releases.json` in the open-atelier-public-website repo, are
      # deliberately left as manual follow-up steps: both need
      # credentials/repo access this workflow doesn't have configured
      # (a deploy SSH key scoped to the update server, and push access to
      # the separate website repo) — see docs referenced in the report
      # for the exact contract before wiring that up.
